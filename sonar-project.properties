sonar.projectKey=axentra
sonar.sources=src,supabase
sonar.tests=src/test

# Exclude generated/boilerplate code from analysis and duplication detection.
# - src/integrations/supabase/types.ts: auto-generated by Supabase CLI
# - supabase/migrations/**: historical DB change files; must not be rewritten
# - supabase/functions/**: edge functions with unavoidable shared boilerplate (CORS, JWT)
sonar.exclusions=src/integrations/supabase/types.ts,supabase/migrations/**,supabase/functions/**
sonar.cpd.exclusions=src/integrations/supabase/types.ts,supabase/migrations/**,supabase/functions/**
